<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bryonpav</title>
  <style>
    :root {
      --bg: #f3efe8;
      --text: #111111;
      --shadow: 0 10px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 14px 32px rgba(0,0,0,0.16);
      --radius: 22px;
      --border: 2px solid #000000;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 20px 40px;
    }

    .site-header {
      margin-bottom: 26px;
    }

    .site-subtitle {
      margin-top: 6px;
      font-size: 0.9rem;
      line-height: 1.2;
      color: #222222;
      font-family: Arial, Helvetica, sans-serif;
    }

    .site-title {
      margin: 0;
      font-family: "Comic Sans MS", "Comic Sans", cursive;
      font-size: clamp(2.2rem, 4vw, 3.5rem);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    .tile-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 22px;
    }

    .tile {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 158px;
      padding: 18px;
      border-radius: var(--radius);
      border: var(--border);
      text-decoration: none;
      text-align: center;
      font-size: 1.15rem;
      font-weight: 700;
      box-shadow: var(--shadow);
      transition: transform 140ms ease, box-shadow 140ms ease;
      transform-origin: center center;
      will-change: transform;
      position: relative;
      overflow: hidden;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .tile::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.14);
      z-index: 1;
    }

    .tile:hover,
    .tile:focus-visible {
      transform: scale(1.035);
      box-shadow: var(--shadow-hover);
    }

    .tile:focus-visible {
      outline: 3px solid rgba(0,0,0,0.20);
      outline-offset: 2px;
    }

    .tile span {
      position: relative;
      z-index: 2;
    }

    .text-black {
      color: #000000;
      text-shadow:
        -2px -2px 0 #fff,
         2px -2px 0 #fff,
        -2px  2px 0 #fff,
         2px  2px 0 #fff,
         0px -2px 0 #fff,
         0px  2px 0 #fff,
        -2px  0px 0 #fff,
         2px  0px 0 #fff,
         0 0 6px rgba(255,255,255,0.35);
    }

    .text-white-outline {
      color: #ffffff;
      text-shadow:
        -2px -2px 0 #000,
         2px -2px 0 #000,
        -2px  2px 0 #000,
         2px  2px 0 #000,
         0px -2px 0 #000,
         0px  2px 0 #000,
        -2px  0px 0 #000,
         2px  0px 0 #000,
         0 0 6px rgba(0,0,0,0.4);
    }

    .text-white {
      color: #ffffff;
      text-shadow:
        -2px -2px 0 #000,
         2px -2px 0 #000,
        -2px  2px 0 #000,
         2px  2px 0 #000,
         0px -2px 0 #000,
         0px  2px 0 #000,
        -2px  0px 0 #000,
         2px  0px 0 #000,
         0 0 6px rgba(0,0,0,0.4);
    }

    .tile-1 { background-image: url('https://raw.githubusercontent.com/bryonpav/home/refs/heads/main/particle-life.webp'); background-color: #f2b8c6; }
    .tile-2 { background-image: url('https://raw.githubusercontent.com/bryonpav/home/refs/heads/main/electron-orbitals.webp'); background-color: #b8e3b1; }
    .tile-3 { background-image: url('https://raw.githubusercontent.com/bryonpav/home/refs/heads/main/julia-sets.webp'); background-color: #a9d1f3; }
    .tile-4 { background-image: url('https://raw.githubusercontent.com/bryonpav/home/refs/heads/main/suno-music.webp'); background-color: #d9b7f5; }
    .tile-5 { background-image: url('https://raw.githubusercontent.com/bryonpav/home/refs/heads/main/kissing-circles.webp'); background-color: #cbbaf3; }
    .tile-6 { background-image: url('https://raw.githubusercontent.com/bryonpav/home/refs/heads/main/zscore-probabilities.webp'); background-color: #f2dd76; }
    .tile-7 { background-image: url('https://raw.githubusercontent.com/bryonpav/home/refs/heads/main/crosss-theorem.webp'); background-color: #95ddd0; }

    @media (max-width: 760px) {
      .page {
        padding: 22px 16px 28px;
      }

      .tile-grid {
        grid-template-columns: 1fr;
        gap: 18px;
      }

      .tile {
        min-height: 132px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="site-header">
      <h1 class="site-title">bryonpav</h1>
      <div class="site-subtitle">Fun things by Bryon Pavlacka</div>
    </header>

    <section class="tile-grid" aria-label="Project links">
      <a class="tile tile-1 text-white-outline" href="https://bryonpav.github.io/particle-life/"><span>Particle Life</span></a>
      <a class="tile tile-2 text-black" href="https://bryonpav.github.io/electron-orbitals/"><span>Electron Orbitals</span></a>
      <a class="tile tile-3 text-white" href="https://bryonpav.github.io/julia-sets/"><span>Julia Sets</span></a>
      <a class="tile tile-4 text-white" href="https://bryonpav.github.io/suno-music/"><span>Suno Music</span></a>
      <a class="tile tile-5 text-black" href="https://www.desmos.com/calculator/e363185350"><span>Kissing Circles</span></a>
      <a class="tile tile-6 text-black" href="https://www.desmos.com/calculator/7toxofrh6s"><span>Z Score Probabilities</span></a>
      <a class="tile tile-7 text-black" href="https://www.desmos.com/calculator/a82afbe8a8"><span>Cross's Theorem</span></a>
    </section>
  </main>
</body>
</html>
